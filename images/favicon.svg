<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4B91" />
      <stop offset="100%" stop-color="#7868e6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="256" cy="256" r="240" fill="#0c0c0e" stroke="url(#grad)" stroke-width="16" />
  <g filter="url(#glow)">
    <line x1="256" y1="210" x2="256" y2="400" stroke="#ffffff" stroke-width="40" stroke-linecap="round" />
    <circle cx="256" cy="120" r="30" fill="#FF4B91" />
  </g>
</svg>
